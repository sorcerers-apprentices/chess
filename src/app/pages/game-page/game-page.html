<app-header />
<main tuiNavigationMain>
  <app-navigation />
  <section class="game-wrapper">
    <section class="game-extra-left"><!-- слева --></section>
    <article class="game-board">
      <div class="player-panel top">
        <app-player-panel [color]="topPlayerColor()" />
      </div>
      <app-chess-board
        [fromSquare]="dragFrom()"
        [allowedTargets]="allowedTargets()"
        (move)="onBoardMove($event)"
        (dragStart)="onBoardDragStart($event)"
        (dragEnd)="onBoardDragEnd()"
      />
      <div class="player-panel bottom">
        <app-player-panel [color]="bottomPlayerColor()" />
      </div>
    </article>
    <aside class="game-settings">
      <app-game-settings />
    </aside>
    <section class="game-extra-right"><!-- справа --></section>
  </section>
</main>

<ng-template #gameOverTpl let-observer>
  <section class="p-6 text-center">
    <h2 class="text-2xl font-bold mb-4">GAME OVER</h2>
    <button tuiButton appearance="primary" (click)="observer.complete()">
      OK
    </button>
  </section>
</ng-template>
