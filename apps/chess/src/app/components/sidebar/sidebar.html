<tui-data-list>
  @for (group of sidebarGroups(); track group.key) {
  <tui-opt-group [label]="group.key">
    @for (item of group.value; track item.name) {
    <button tuiOption type="button" (click)="onClick(item)">
      <img alt="icon" src="/assets/img/sidebar-item.svg" />
      {{ item.name }}
    </button>
    }
  </tui-opt-group>
  }

  <tui-opt-group>
    <label tuiOption (click)="toggleTheme()" role="button" tabindex="0">
      <input
        size="s"
        tuiSwitch
        type="checkbox"
        [checked]="darkMode()"
        readonly
      />
      Dark mode
    </label>
  </tui-opt-group>
</tui-data-list>
