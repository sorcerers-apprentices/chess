<app-header />
<main tuiNavigationMain class="sign-up">
  <div class="sign-up_container">
    <h2 tuiText class="tui-text_h2 sign-up_title">
      Sign Up to Our Game Service
    </h2>
    <p class="sign-up_text">Fill out the form to sign up to our game service</p>
    <form [formGroup]="signupForm" (submit)="signup()" class="sign-up_form">
      <label tuiLabel>
        Email
        <tui-textfield tuiTextfieldSize="m">
          <input
            placeholder="Enter your email"
            tuiTextfield
            formControlName="email"
          />
        </tui-textfield>
        <tui-error
          formControlName="email"
          [error]="[] | tuiFieldError | async"
        />
      </label>
      <label tuiLabel>
        Phone number
        <tui-textfield tuiTextfieldSize="m">
          <input
            formControlName="phone"
            tuiInputPhoneInternational
            [countries]="countries"
            [(countryIsoCode)]="countryIsoCode"
            placeholder="+34 (55) 123-4567"
          />
        </tui-textfield>
        <tui-error
          formControlName="phone"
          [error]="[] | tuiFieldError | async"
        />
      </label>
      <label tuiLabel>
        Name
        <tui-textfield tuiTextfieldSize="m">
          <input
            placeholder="Enter your name"
            type="text"
            tuiTextfield
            formControlName="username"
          />
        </tui-textfield>
        <tui-error
          formControlName="username"
          [error]="[] | tuiFieldError | async"
        />
      </label>
      <label tuiLabel>
        Password
        <tui-textfield tuiTextfieldSize="m">
          <input
            placeholder="Enter your password"
            type="password"
            tuiTextfield
            formControlName="password"
          />
          <tui-icon tuiPassword />
        </tui-textfield>
        <tui-error
          formControlName="password"
          [error]="[] | tuiFieldError | async"
        />
      </label>
      <button size="m" tuiButton type="submit" class="sign-up_button">
        Sign Up
      </button>
    </form>
  </div>
  <app-navigation />
</main>
